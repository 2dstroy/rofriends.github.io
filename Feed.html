 <!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rofriends • Social Hub</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

body {
  font-family: 'Segoe UI', system-ui, Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #111827, #1e293b);
  color: white;
  min-height: 100vh;
  overflow: hidden;
}

/* Background Glows */
.background-glow, .background-glow2 {
  position: fixed;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.12;
  z-index: 0;
  pointer-events: none;
}

.background-glow {
  width: 600px;
  height: 600px;
  background: #00b7ff;
  top: -150px;
  right: -100px;
}

.background-glow2 {
  width: 500px;
  height: 500px;
  background: #0072ff;
  bottom: -120px;
  left: -120px;
}

.app {
  position: relative;
  z-index: 1;
  display: flex;
  min-height: 100vh;
}

/* LEFT SIDEBAR */
.sidebar {
  width: 280px;
  padding: 24px;
  border-right: 1px solid rgba(255, 255, 255, 0.08);
  display: flex;
  flex-direction: column;
  gap: 32px;
  background: rgba(15, 23, 42, 0.6);
  backdrop-filter: blur(12px);
}

.logo {
  font-size: 28px;
  font-weight: 800;
  background: linear-gradient(90deg, #00c6ff, #0072ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  display: flex;
  align-items: center;
  gap: 8px;
}

.nav {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 14px 20px;
  border-radius: 16px;
  color: #cbd5e1;
  text-decoration: none;
  font-weight: 600;
  transition: all 0.3s;
}

.nav-item:hover, .nav-item.active {
  background: rgba(0, 183, 255, 0.15);
  color: #00b7ff;
}

.nav-item i {
  font-size: 24px;
}

/* MAIN FEED */
.main {
  flex: 1;
  max-width: 620px;
  border-right: 1px solid rgba(255, 255, 255, 0.08);
  padding: 20px;
  overflow-y: auto;
  background: rgba(15, 23, 42, 0.4);
}

.header {
  padding: 16px 20px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  position: sticky;
  top: 0;
  background: rgba(15, 23, 42, 0.95);
  backdrop-filter: blur(12px);
  z-index: 10;
}

.header h1 {
  font-size: 24px;
  font-weight: 700;
}

.compose {
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 24px;
}

.compose-input {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  color: white;
  font-size: 17px;
  resize: none;
  height: 60px;
}

.compose-actions {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid rgba(255,255,255,0.1);
}

.post-btn {
  background: linear-gradient(135deg, #00b7ff, #0072ff);
  color: white;
  border: none;
  padding: 10px 28px;
  border-radius: 9999px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

.post-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(0, 183, 255, 0.4);
}

/* POST */
.post {
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 20px;
  backdrop-filter: blur(10px);
}

.post-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
}

.avatar {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: linear-gradient(135deg, #00c6ff, #0072ff);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.post-user {
  font-weight: 600;
}

.post-handle {
  color: #64748b;
}

.post-content {
  margin-bottom: 16px;
  line-height: 1.5;
  font-size: 16px;
}

.post-image {
  width: 100%;
  border-radius: 16px;
  margin: 12px 0;
  border: 1px solid rgba(255,255,255,0.1);
}

.post-actions {
  display: flex;
  justify-content: space-between;
  max-width: 320px;
  margin-top: 12px;
}

.action {
  display: flex;
  align-items: center;
  gap: 8px;
  color: #94a3b8;
  cursor: pointer;
  padding: 6px 12px;
  border-radius: 9999px;
  transition: 0.2s;
}

.action:hover {
  color: #00b7ff;
  background: rgba(0, 183, 255, 0.1);
}

/* RIGHT SIDEBAR */
.right-sidebar {
  width: 300px;
  padding: 24px;
  background: rgba(15, 23, 42, 0.6);
  backdrop-filter: blur(12px);
}

.widget {
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 24px;
}

.widget h3 {
  margin-bottom: 16px;
  color: #00b7ff;
}

.trend {
  padding: 12px 0;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.trend:last-child {
  border-bottom: none;
}

.user-suggestion {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 16px 0;
}

.suggestion-info {
  flex: 1;
}

.follow-btn {
  background: rgba(0, 183, 255, 0.2);
  color: #00b7ff;
  border: none;
  padding: 6px 16px;
  border-radius: 9999px;
  font-size: 14px;
  cursor: pointer;
}

/* UTILITIES */
.scrollbar::-webkit-scrollbar {
  width: 6px;
}
.scrollbar::-webkit-scrollbar-thumb {
  background: rgba(0, 183, 255, 0.3);
  border-radius: 20px;
}  </style>

<body>

  <div class="background-glow2"></div>

  <div class="app">
    <!-- LEFT SIDEBAR -->
    <div class="sidebar">
      <div class="logo">
        <span style="font-size:32px;"></span> Rofriends
      </div>
      
  <div class="nav">
    <a href="#" class="nav-item active"><i class="fa-solid fa-house"></i> Home</a>
    <a href="#" class="nav-item"><i class="fa-solid fa-magnifying-glass"></i> Explore</a>
    <a href="#" class="nav-item"><i class="fa-solid fa-bell"></i> Notifications</a>
    <a href="#" class="nav-item"><i class="fa-solid fa-envelope"></i> Messages</a>
    <a href="#" class="nav-item"><i class="fa-solid fa-users"></i> Friends</a>
    <a href="#" class="nav-item"><i class="fa-solid fa-user"></i> Profile</a>
  </div>

  <button onclick="alert('Post something cool!')" 
          style="margin-top: auto; padding: 16px; background: linear-gradient(135deg, #00b7ff, #0072ff); border: none; border-radius: 9999px; color: white; font-weight: bold; font-size: 17px; cursor: pointer;">
    <i class="fa-solid fa-feather-pointed"></i> Post
  </button>
</div>

<!-- MAIN FEED -->
<div class="main scrollbar">
  <div class="header">
    <h1>Home</h1>
    <div style="display:flex; align-items:center; gap:12px;">
      <input type="text" placeholder="Search Rofriends..." 
             style="background:rgba(255,255,255,0.08); border:none; border-radius:9999px; padding:10px 20px; width:280px; color:white;">
      <div class="avatar" style="width:38px;height:38px;font-size:18px;"></div>
    </div>
  </div>

  <!-- COMPOSE -->
  <div class="compose">
    <div style="display:flex; gap:14px;">
      <div class="avatar" style="width:48px;height:48px;font-size:24px;">
