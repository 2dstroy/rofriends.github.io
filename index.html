<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ronin Login - WalletConnect + Injected</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.5/dist/ethers.umd.min.js"></script>
  <!-- Reown AppKit CDN (for quick demo) -->
  <script src="https://cdn.jsdelivr.net/npm/@reown/appkit@1/dist/appkit.min.js"></script>
</head>
<body>
  <button id="login-injected">Login with Ronin Extension</button>
  <button id="login-wc">Login with WalletConnect</button>
  <p id="status"></p>

  <script>
    const status = document.getElementById("status");
    const projectId = "YOUR_REOWN_PROJECT_ID"; // Get from https://cloud.reown.com

    // Initialize Reown AppKit
    const networks = [{
      chainId: 2020,                    // Ronin Mainnet
      name: "Ronin",
      currency: "RON",
      rpcUrl: "https://api.roninchain.com/rpc",
      explorerUrl: "https://app.roninchain.com"
    }];

    const appKit = new window.AppKit({
      projectId,
      networks,
      defaultNetwork: networks[0],
      themeMode: "dark"
    });

    // === WalletConnect Login ===
    document.getElementById("login-wc").onclick = async () => {
      try {
        status.innerText = "Opening WalletConnect...";
        const { address } = await appKit.open(); // Opens modal

        if (!address) {
          status.innerText = "Connection cancelled";
          return;
        }

        await handleLogin(address);
      } catch (err) {
        console.error(err);
        status.innerText = "Connection failed";
      }
    };

    // === Existing Injected Ronin Login (for reference) ===
    document.getElementById("login-injected").onclick = async () => {
      // ... your previous ethers v6 injected code ...
    };

    // Shared login flow (nonce + signature)
    async function handleLogin(address) {
      status.innerText = `Connected: ${address.slice(0,6)}...${address.slice(-4)}`;

      // 1. Get nonce
      const nonceRes = await fetch("YOUR_SUPABASE_FUNCTION_URL", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "get_nonce", address })
      });
      const { nonce } = await nonceRes.json();

      const message = `Login to Rofriends with nonce: ${nonce}`;

      // 2. Sign (works with both injected and WalletConnect)
      const signer = await appKit.getSigner(); // or use provider.getSigner() if using ethers directly
      const signature = await signer.signMessage(message);

      // 3. Verify on backend
      const verifyRes = await fetch("YOUR_SUPABASE_FUNCTION_URL", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "verify", address, signature, message })
      });

      const result = await verifyRes.json();
      status.innerText = result.success ? `✅ Logged in!` : "❌ Verification failed";
    }
  </script>
</body>
</html>
