<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Ronin Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #272528;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .container {
            width: 360px;
            background: #1e1d20;
            border-radius: 18px;
            padding: 30px;
            box-shadow: 0 0 25px rgba(0,0,0,0.5);
            text-align: center;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .title {
            font-size: 22px;
            font-weight: bold;
        }

        .dot {
            height: 10px;
            width: 10px;
            background: #2d6bff;
            border-radius: 50%;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: 0.2s;
            margin-top: 10px;
        }

        .ronin-btn {
            background: #2d6bff;
            color: white;
        }

        .ronin-btn:hover {
            background: #1f55d6;
        }

        .status {
            margin-top: 20px;
            font-size: 14px;
            color: #aaa;
        }

        .wallet-info {
            margin-top: 15px;
            font-size: 14px;
            word-break: break-all;
            color: #22c55e;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="title">Ronin Login</div>
            <div class="dot"></div>
        </div>

        <button class="btn ronin-btn" id="signInBtn">
            Connect to Ronin Wallet
        </button>

        <div class="status" id="status">Disconnected</div>
        <div class="wallet-info" id="wallet"></div>
    </div>

    <script>
        const signInBtn = document.getElementById("signInBtn");
        const statusEl = document.getElementById("status");
        const walletEl = document.getElementById("wallet");

        const RONIN_CHAIN_ID = "0x7e4"; // 2020 in hex

        async function connectToRonin() {
            try {
                statusEl.innerText = "Connecting to Ronin Wallet...";
                signInBtn.disabled = true;
                signInBtn.innerText = "Connecting...";

                const provider = window.ronin || window.ethereum;

                if (!provider) {
                    alert("Ronin Wallet not detected!\nPlease install the Ronin Wallet extension.");
                    window.open("https://wallet.roninchain.com", "_blank");
                    resetButton();
                    return;
                }

                // Switch to Ronin Network if needed
                try {
                    await provider.request({
                        method: 'wallet_switchEthereumChain',
                        params: [{ chainId: RONIN_CHAIN_ID }]
                    });
                } catch (switchError) {
                    // If chain doesn't exist, add it
                    if (switchError.code === 4902) {
                        await provider.request({
                            method: 'wallet_addEthereumChain',
                            params: [{
                                chainId: RONIN_CHAIN_ID,
                                chainName: 'Ronin',
                                nativeCurrency: { name: 'RON', symbol: 'RON', decimals: 18 },
                                rpcUrls: ['https://api.roninchain.com/rpc'],
                                blockExplorerUrls: ['https://app.roninchain.com/']
                            }]
                        });
                    } else {
                        throw switchError;
                    }
                }

                // Request accounts
                const accounts = await provider.request({
                    method: "eth_requestAccounts"
                });

                const address = accounts[0];
                const shortAddress = `${address.slice(0, 6)}...${address.slice(-4)}`;

                walletEl.innerText = `Connected: ${shortAddress}`;
                statusEl.innerText = "Wallet Connected ✓";

                // Optional: Request signature for login
                const sign = confirm("Do you want to sign a message to complete login?");
                if (sign) {
                    statusEl.innerText = "Please sign the message...";

                    const message = `Sign in to Ronin Login\n\nAddress: ${address}\nTime: ${new Date().toISOString()}`;

                    const signature = await provider.request({
                        method: "personal_sign",
                        params: [message, address]
                    });

                    console.log("Signature:", signature);
                    statusEl.innerText = "✅ Successfully Signed In!";
                }

                signInBtn.innerText = "Connected ✓";
                signInBtn.style.background = "#22c55e";

            } catch (error) {
                console.error(error);
                statusEl.innerText = "❌ Connection failed";
                resetButton();
            }
        }

        function resetButton() {
            signInBtn.disabled = false;
            signInBtn.innerText = "Connect to Ronin Wallet";
            signInBtn.style.background = "";
        }

        signInBtn.addEventListener("click", connectToRonin);
    </script>
</body>
</html>
