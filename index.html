<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ronin Wallet Login</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1f1f24, #0b0b10);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }

    h1 {
      margin-bottom: 20px;
    }

    button {
      padding: 12px 22px;
      font-size: 16px;
      background: #00ffa3;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    button:hover {
      background: #00d48a;
      transform: scale(1.05);
    }

    #wallet {
      margin-top: 20px;
      max-width: 90%;
      word-break: break-all;
      text-align: center;
      opacity: 0.9;
    }

    .card {
      padding: 30px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Ronin Wallet Login</h1>
    <button id="connectBtn">Connect Wallet</button>
    <p id="wallet">Not connected</p>
  </div>

  <script>
    const connectBtn = document.getElementById("connectBtn");
    const walletText = document.getElementById("wallet");

    async function connectWallet() {
      try {
        const provider = window.ethereum;

        if (!provider) {
          alert("No wallet found. Please install Ronin Wallet.");
          return;
        }

        const accounts = await provider.request({
          method: "eth_requestAccounts"
        });

        const address = accounts[0];

        walletText.innerText = "Connected: " + address;
        console.log("Connected wallet:", address);

      } catch (err) {
        console.error(err);
        walletText.innerText = "Connection failed";
      }
    }

    connectBtn.addEventListener("click", connectWallet);
  </script>

</body>
</html>
