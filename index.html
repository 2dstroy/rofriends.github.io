<!DOCTYPE html>
<html>
<head>
  <title>ROFriends</title>
</head>
<body>

  <button id="loginBtn">Sign In With Ronin</button>
  <p id="wallet"></p>

  <script>
    const loginBtn = document.getElementById("loginBtn");
    const walletEl = document.getElementById("wallet");

    async function connectRonin() {
      if (typeof window.ronin === "undefined") {
        alert("Ronin Wallet is not installed!\n\nPlease install the Ronin Wallet extension first.");
        window.open("https://wallet.roninchain.com", "_blank");
        return;
      }

      try {
        // Use the correct provider path
        const provider = window.ronin.provider || window.ronin;

        const accounts = await provider.request({
          method: "eth_requestAccounts"
        });

        const address = accounts[0];
        walletEl.innerText = `Connected: ${address}`;
        
        console.log("✅ Connected:", address);
        alert("Login Success! ✅");

      } catch (err) {
        console.error(err);
        alert("Connection Failed: " + (err.message || err));
      }
    }

    loginBtn.addEventListener("click", connectRonin);
  </script>

</body>
</html>
