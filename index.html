<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ronin Login</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #272528; /* extracted dark theme */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
  }

  .container {
    width: 360px;
    background: #1e1d20;
    border-radius: 18px;
    padding: 20px;
    box-shadow: 0 0 25px rgba(0,0,0,0.5);
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .title {
    font-size: 18px;
    font-weight: bold;
  }

  .wallet-box {
    margin-top: 15px;
    padding: 15px;
    background: #2a2a2e;
    border-radius: 12px;
    text-align: center;
  }

  .balance {
    font-size: 28px;
    font-weight: bold;
    color: #ffffff;
  }

  .sub {
    font-size: 12px;
    color: #999;
  }

  .btn {
    margin-top: 20px;
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    font-size: 14px;
    transition: 0.2s;
  }

  .ronin-btn {
    background: #2d6bff;
    color: white;
  }

  .ronin-btn:hover {
    background: #1f55d6;
  }

  .status {
    margin-top: 10px;
    font-size: 12px;
    color: #aaa;
    text-align: center;
  }

  .dot {
    height: 8px;
    width: 8px;
    background: #2d6bff;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
  }
</style>
</head>

<body>

<div class="container">
  <div class="header">
    <div class="title">Ronin Login</div>
    <div class="dot"></div>
  </div>

  <div class="wallet-box">
    <div class="sub">Total Balance</div>
    <div class="balance" id="balance">$0.00</div>
    <div class="sub" id="wallet">Not Connected</div>
  </div>

  <button class="btn ronin-btn" onclick="connectRonin()">
    Sign in with Ronin Wallet
  </button>

  <div class="status" id="status">Disconnected</div>
</div>

<script>
async function connectRonin() {
  const status = document.getElementById("status");
  const wallet = document.getElementById("wallet");

  try {
    status.innerText = "Connecting...";

    // Ronin Wallet (in browser extension)
    if (window.ronin || window.ethereum) {
      const provider = window.ronin || window.ethereum;

      const accounts = await provider.request({
        method: "eth_requestAccounts"
      });

      const address = accounts[0];

      wallet.innerText = address.slice(0, 6) + "..." + address.slice(-4);
      status.innerText = "Connected";
    } else {
      status.innerText = "Ronin Wallet not found";
      alert("Please install Ronin Wallet extension");
    }

  } catch (err) {
    console.error(err);
    status.innerText = "Connection failed";
  }
}
</script>

</body>
</html>
